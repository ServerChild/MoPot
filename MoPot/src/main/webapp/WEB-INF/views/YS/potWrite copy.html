<!DOCTYPE html>
<html lang="ko">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>모집 글 쓰기</title>
</head>
<body>
	<!-- 헤더 인클루드 -->

	<form action="potWrite" method="post">
		<!-- 제목 -->
		<label for="postTitle">제목</label><br>
		<input type="text" id="postTitle" name="postTitle" required>
		<br><br>

		<!-- 닉네임(지정값 불러오기) -->
		<label for="nickname">작성자 : ${ loginuser.usename }</label>
		<!-- 닉네임을 동적으로 불러오거나 사용자가 편집할 수 있는 경우 입력 필드를 사용할 수 있습니다. -->
		<!-- 예: <input type="text" id="nickname" name="nickname" value="고정닉네임" readonly> -->
		<br><br>

		<!-- 본문 -->
		<label for="postContent">본문</label><br>
		<textarea id="postContent" name="postContent" rows="4" cols="50" required></textarea>
		<br><br>

		<!-- 모집 인원 -->
		<label for="recruitmentCount">모집 인원</label><br>
		<select name="headCount" id="headCount">
			<option value="" selected>인원을 선택하새요</option>
			<option value="1">2</option>
			<option value="2">3</option>
			<option value="3">4</option>
			<option value="4">5</option>
			<option value="5">6</option>
		</select>
		<br><br>

		<!-- 해시태그 -->
		<label for="hashtags">해시태그</label><br>
		<input type="text" id="hashtags" name="hashtags">
		<br><br>

		<!-- 등록, 취소 버튼 -->
		<button type="submit">등록</button>
		<button type="button">취소</button>

		<!-- 푸터 인클루드 -->
	</form>
</body>
</html>
